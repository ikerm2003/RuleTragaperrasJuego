# alembic.ini – Alembic migration configuration for casino_db
# Run migrations from the project root: alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Connection URL – override with DATABASE_URL environment variable or edit here
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/casino_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
